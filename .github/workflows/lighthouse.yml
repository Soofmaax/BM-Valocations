name: Lighthouse CI - Audit perf/SEO/a11y

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lhci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Lighthouse CI against production domain
        uses: treosh/lighthouse-ci-action@v11
        with:
          urls: |
            https://bm-valocations.com/
            https://bm-valocations.com/fleet
            https://bm-valocations.com/support
          uploadArtifacts: true
          temporaryPublicStorage: true
          configPath: ./lighthouserc.json

      - name: Upload LHCI reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-reports
          path: ".lighthouseci/*"