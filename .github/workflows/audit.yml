name: Audit - Meta & Links (PR)

on:
  pull_request:
    branches: [ main ]

jobs:
  audit-site:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Check production availability
        id: prodcheck
        run: |
          set -e
          if curl -sSfI https://bm-valocations.com/ >/dev/null; then
            echo "ok=true" >> $GITHUB_OUTPUT
          else
            echo "ok=false" >> $GITHUB_OUTPUT
          fi

      - name: Build and preview locally (fallback)
        if: steps.prodcheck.outputs.ok != 'true'
        run: |
          npm run build
          nohup npm run preview:ci >/dev/null 2>&1 &
          for i in {1..30}; do
            if curl -sSf http://127.0.0.1:4173 >/dev/null; then
              echo "Preview server is up."
              break
            fi
            echo "Waiting for preview server..."
            sleep 2
          done

      - name: Run audit against production
        if: steps.prodcheck.outputs.ok == 'true'
        run: npm run audit:site -- "https://bm-valocations.com"

      - name: Run audit against local preview
        if: steps.prodcheck.outputs.ok != 'true'
        env:
          BASE_URL: "http://127.0.0.1:4173"
        run: npm run audit:site

      - name: Upload audit report
        uses: actions/upload-artifact@v4
        with:
          name: audit-report
          path: ./audit-report.md

      - name: Comment audit summary on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const reportPath = path.resolve('audit-report.md');
            let content = '';
            try {
              content = fs.readFileSync(reportPath, 'utf8');
            } catch (e) {
              content = 'Audit report not found.';
            }
            const head = '### Audit Meta & Links\n\n';
            const body = head + 'Un rapport détaillé est attaché comme artefact (`audit-report`).\n\n' +
              'Extrait:\n\n' +
              '```\n' + content.slice(0, 1000) + '\n```\n' +
              '\n— CI audit automatique';
            const issue_number = context.issue.number;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              body
            });