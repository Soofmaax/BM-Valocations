name: Lighthouse CI - Audit perf/SEO/a11y

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lhci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Start preview server
        run: |
          nohup npm run preview:ci >/dev/null 2>&1 &
          for i in {1..30}; do
            if curl -sSf http://127.0.0.1:4173 >/dev/null; then
              echo "Preview server is up."
              break
            fi
            echo "Waiting for preview server..."
            sleep 2
          done

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v11
        with:
          urls: |
            http://127.0.0.1:4173/
            http://127.0.0.1:4173/fleet
            http://127.0.0.1:4173/support
          uploadArtifacts: true
          temporaryPublicStorage: true
          configPath: ./lighthouserc.json

      - name: Upload LHCI reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-reports
          path: ".lighthouseci/*"