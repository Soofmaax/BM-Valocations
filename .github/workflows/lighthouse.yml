name: Lighthouse CI - Audit perf/SEO/a11y

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lhci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check production availability
        id: prodcheck
        run: |
          set -e
          if curl -sSfI https://bm-valocations.com/ >/dev/null; then
            echo "ok=true" >> $GITHUB_OUTPUT
          else
            echo "ok=false" >> $GITHUB_OUTPUT
          fi

      - name: Run Lighthouse CI against production
        if: steps.prodcheck.outputs.ok == 'true'
        uses: treosh/lighthouse-ci-action@v11
        with:
          urls: |
            https://bm-valocations.com/
            https://bm-valocations.com/fleet
            https://bm-valocations.com/support
          uploadArtifacts: true
          temporaryPublicStorage: true
          configPath: ./lighthouserc.json

      - name: Setup Node.js et installer les dépendances (fallback)
        if: steps.prodcheck.outputs.ok != 'true'
        uses: ./.github/actions/setup-node-deps
        with:
          node-version: "20"
          prefer-ci: "true"

      - name: Build (fallback)
        if: steps.prodcheck.outputs.ok != 'true'
        run: npm run build

      - name: Start preview server (fallback)
        if: steps.prodcheck.outputs.ok != 'true'
        run: |
          nohup npm run preview:ci >/dev/null 2>&1 &
          for i in {1..30}; do
            if curl -sSf http://127.0.0.1:4173 >/dev/null; then
              echo "Preview server is up."
              break
            fi
            echo "Waiting for preview server..."
            sleep 2
          done

      - name: Run Lighthouse CI against local preview (fallback)
        if: steps.prodcheck.outputs.ok != 'true'
        uses: treosh/lighthouse-ci-action@v11
        with:
          urls: |
            http://127.0.0.1:4173/
            http://127.0.0.1:4173/fleet
            http://127.0.0.1:4173/support
          uploadArtifacts: true
          temporaryPublicStorage: true
          configPath: ./lighthouserc.json

      - name: Upload LHCI reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-reports
          path: ".lighthouseci/*"